<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Mock Scheduler | Mobile Optimized</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Glassmorphism utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }

        /* Tooltip behavior for mobile */
        @media (max-width: 768px) {
            .calendar-tooltip { display: none !important; } /* Hide complex tooltips on small mobile */
        }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-indigo-100 via-fuchsia-50 to-cyan-100 min-h-screen text-slate-800 antialiased p-3 md:p-8 pb-20" onload="initScheduler()">

    <div class="max-w-6xl mx-auto space-y-6 md:space-y-10">
        
        <div class="text-center md:text-left pt-4 md:pt-6 pb-2">
            <h1 class="text-4xl md:text-6xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 tracking-tight pb-2 drop-shadow-sm">
                Mock Scheduler
            </h1>
            <p class="text-slate-600 mt-1 md:mt-2 italic" style="font-family: Georgia, serif; font-size: 1.1rem;">
                Plan your preparations and get notified on time.
            </p>
        </div>

        <div class="glass-card p-5 md:p-8 rounded-[2rem] relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-gradient-to-br from-purple-400 to-indigo-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30 z-0"></div>
            
            <h2 class="text-xl md:text-2xl font-bold text-slate-800 mb-6 relative z-10 flex items-center gap-2">
                <span class="bg-gradient-to-r from-blue-600 to-purple-600 text-transparent bg-clip-text">✦</span> Create Schedule
            </h2>
            
            <form id="scheduleForm" onsubmit="saveMock(event)" class="relative z-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Mock Title</label>
                        <input type="text" id="title" required placeholder="e.g., TIME AIMCAT 3" 
                               class="w-full p-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-slate-800 shadow-inner">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Mock Type</label>
                        <select id="mockType" class="w-full p-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-slate-800 shadow-inner appearance-none">
                            <option value="Full Length">Full Length Mock</option>
                            <option value="VARC">VARC Sectional</option>
                            <option value="QA">QA Sectional</option>
                            <option value="LRDI">LRDI Sectional</option>
                            <option value="PYQ">Previous Year Paper (PYQ)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Date & Time</label>
                        <input type="datetime-local" id="mockDate" required 
                               class="w-full p-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-slate-800 shadow-inner">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Notify Me</label>
                        <select id="notifyBefore" class="w-full p-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-slate-800 shadow-inner appearance-none">
                            <option value="5">5 mins before</option>
                            <option value="15" selected>15 mins before</option>
                            <option value="30">30 mins before</option>
                            <option value="60">1 hour before</option>
                        </select>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Additional Notes (Optional)</label>
                    <textarea id="notes" rows="2" placeholder="e.g., Focus on accuracy over speed..." 
                              class="w-full p-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-slate-800 shadow-inner resize-y"></textarea>
                </div>
                
                <div class="flex flex-col md:flex-row justify-end pt-2">
                    <button type="submit" class="w-full md:w-auto bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 hover:opacity-90 text-white font-bold py-4 md:py-3.5 px-10 rounded-2xl shadow-lg shadow-indigo-500/30 transition-transform transform active:scale-95 md:hover:-translate-y-1">
                        + Save Schedule
                    </button>
                </div>
            </form>
        </div>

        <div class="glass-card p-5 md:p-8 rounded-[2rem]">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <span class="bg-gradient-to-r from-emerald-500 to-teal-500 text-transparent bg-clip-text">✦</span> Upcoming Mocks
                </h2>
                <button onclick="downloadPDF()" class="w-full md:w-auto bg-gradient-to-r from-emerald-500 to-teal-500 hover:opacity-90 text-white font-bold py-3.5 px-8 rounded-2xl shadow-lg shadow-teal-500/30 transition-transform active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download PDF
                </button>
            </div>

            <div class="w-full">
                <div class="hidden md:grid grid-cols-12 gap-4 px-6 py-4 bg-gradient-to-r from-slate-50 to-slate-100 border border-slate-200 rounded-t-2xl text-slate-500 text-xs uppercase tracking-widest font-bold">
                    <div class="col-span-5">Mock Details</div>
                    <div class="col-span-3">Date & Time</div>
                    <div class="col-span-2">Notification</div>
                    <div class="col-span-2 text-center">Action</div>
                </div>
                
                <div id="mockListContainer" class="flex flex-col gap-3 md:gap-0 md:border-x md:border-b md:border-slate-200 md:rounded-b-2xl overflow-hidden bg-white/30">
                    </div>
            </div>
        </div>

        <div class="glass-card p-4 md:p-8 rounded-[2rem]">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <span class="bg-gradient-to-r from-amber-500 to-orange-500 text-transparent bg-clip-text">✦</span> Calendar View
                </h2>
                
                <div class="w-full md:w-auto flex items-center justify-between gap-3 bg-white border border-slate-200 p-1.5 rounded-2xl shadow-sm">
                    <button onclick="changeMonth(-1)" class="p-2.5 md:p-2 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors text-slate-600 active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <span id="calendarMonthYear" class="text-base md:text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-700 to-slate-900 text-center flex-grow md:min-w-[140px]"></span>
                    <button onclick="changeMonth(1)" class="p-2.5 md:p-2 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors text-slate-600 active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div class="w-full">
                <div class="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-t-xl overflow-hidden">
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Sun</div>
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Mon</div>
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Tue</div>
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Wed</div>
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Thu</div>
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Fri</div>
                    <div class="bg-slate-50 py-2 md:py-4 text-center text-[10px] md:text-xs font-extrabold text-slate-400 uppercase tracking-wider md:tracking-widest">Sat</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-px bg-slate-200 border-b border-l border-r border-slate-200 rounded-b-xl overflow-hidden">
                    </div>
            </div>
        </div>

    </div>

    <script>
        let mocks = [];
        let currentCalendarDate = new Date();

        function initScheduler() {
            if ("Notification" in window && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            const savedData = localStorage.getItem('scheduledMocks');
            if (savedData) {
                mocks = JSON.parse(savedData);
            }
            renderTable();
            renderCalendar();
            setInterval(checkNotifications, 30000); 
        }

        function saveMock(event) {
            event.preventDefault();
            const title = document.getElementById('title').value;
            const mockType = document.getElementById('mockType').value;
            const mockDate = document.getElementById('mockDate').value;
            const notifyBefore = parseInt(document.getElementById('notifyBefore').value);
            const notes = document.getElementById('notes').value;

            const newMock = {
                id: Date.now(),
                title: title,
                type: mockType,
                mockDate: mockDate,
                notifyBefore: notifyBefore,
                notes: notes,
                notified: false
            };

            mocks.push(newMock);
            localStorage.setItem('scheduledMocks', JSON.stringify(mocks));
            document.getElementById('scheduleForm').reset();
            document.getElementById('mockType').value = 'Full Length';
            
            renderTable();
            renderCalendar(); 
        }

        function deleteMock(id) {
            mocks = mocks.filter(mock => mock.id !== id);
            localStorage.setItem('scheduledMocks', JSON.stringify(mocks));
            renderTable();
            renderCalendar(); 
        }

        function getTypeBadgeColor(type) {
            switch(type) {
                case 'VARC': return 'bg-gradient-to-r from-indigo-100 to-blue-100 text-indigo-800 border-indigo-200';
                case 'QA': return 'bg-gradient-to-r from-emerald-100 to-teal-100 text-teal-800 border-teal-200';
                case 'LRDI': return 'bg-gradient-to-r from-amber-100 to-orange-100 text-amber-800 border-amber-200';
                case 'PYQ': return 'bg-gradient-to-r from-rose-100 to-pink-100 text-rose-800 border-rose-200';
                default: return 'bg-gradient-to-r from-purple-100 to-fuchsia-100 text-purple-800 border-purple-200'; 
            }
        }

        function changeMonth(direction) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + direction);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('calendarMonthYear').textContent = `${monthNames[month]} ${year}`;

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = '';

            const today = new Date();
            const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;

            for (let i = 0; i < firstDayOfMonth; i++) {
                calendarGrid.innerHTML += `<div class="bg-slate-50/50 min-h-[80px] md:min-h-[120px] p-1 md:p-2 opacity-40"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = isCurrentMonth && today.getDate() === day;
                const dateHeaderClass = isToday 
                    ? `bg-gradient-to-br from-blue-500 to-purple-600 text-white w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-full text-xs md:text-sm font-bold shadow-lg shadow-purple-500/40 md:transform md:scale-110` 
                    : `text-[10px] md:text-sm font-bold text-slate-500 p-1`;

                const mocksToday = mocks.filter(mock => {
                    const mockDate = new Date(mock.mockDate);
                    return mockDate.getDate() === day && mockDate.getMonth() === month && mockDate.getFullYear() === year;
                });

                let mocksHTML = '';
                mocksToday.forEach(mock => {
                    const mockTime = new Date(mock.mockDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const badgeClass = getTypeBadgeColor(mock.type || 'Full Length');
                    
                    mocksHTML += `
                        <div class="mt-1 p-1 md:p-2 border rounded cursor-help group relative shadow-sm hover:shadow-md transition-shadow ${badgeClass}">
                            <div class="md:hidden text-[9px] font-bold truncate leading-tight text-center">${mock.type?.substring(0,2) || 'FL'}</div>
                            
                            <div class="hidden md:block text-xs">
                                <span class="font-extrabold block opacity-80">${mockTime}</span>
                                <span class="font-bold truncate block">${mock.title}</span>
                            </div>
                            
                            <div class="calendar-tooltip absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 hidden group-hover:block w-56 p-3 bg-slate-800 text-white text-xs rounded-xl shadow-2xl z-20 whitespace-normal backdrop-blur-md bg-opacity-95 border border-slate-700">
                                <p class="font-bold border-b border-slate-600 pb-1.5 mb-1.5 text-indigo-300">${mock.title}</p>
                                <p class="font-medium text-slate-200">Category: ${mock.type || 'Mock'}</p>
                                <p class="font-medium text-slate-200">Time: ${mockTime}</p>
                                ${mock.notes ? `<p class="mt-2 italic text-slate-400 pt-1 border-t border-slate-700">"${mock.notes}"</p>` : ''}
                            </div>
                        </div>`;
                });

                calendarGrid.innerHTML += `
                    <div class="bg-white min-h-[80px] md:min-h-[120px] p-1 md:p-2 flex flex-col transition-colors hover:bg-indigo-50/30 group">
                        <div class="flex justify-center md:justify-end mb-1">
                            <span class="${dateHeaderClass}">${day}</span>
                        </div>
                        <div class="flex flex-col gap-0.5 md:gap-1 flex-grow">
                            ${mocksHTML}
                        </div>
                    </div>
                `;
            }

            const totalCells = firstDayOfMonth + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 0; i < remainingCells; i++) {
                calendarGrid.innerHTML += `<div class="bg-slate-50/50 min-h-[80px] md:min-h-[120px] p-1 md:p-2 opacity-40"></div>`;
            }
        }

        function renderTable() {
            const listContainer = document.getElementById('mockListContainer');
            listContainer.innerHTML = ''; 

            if (mocks.length === 0) {
                listContainer.innerHTML = `
                    <div class="p-10 text-center text-slate-400 font-medium bg-white/50">
                        <div class="flex flex-col items-center justify-center gap-2">
                            <span class="text-3xl opacity-50">📋</span>
                            No mocks scheduled yet.
                        </div>
                    </div>`;
                return;
            }

            mocks.sort((a, b) => new Date(a.mockDate) - new Date(b.mockDate));

            mocks.forEach(mock => {
                const dateObj = new Date(mock.mockDate);
                const formattedDate = dateObj.toLocaleString('en-US', { 
                    weekday: 'short', month: 'short', day: 'numeric', 
                    hour: 'numeric', minute: '2-digit', hour12: true 
                });

                const displayType = mock.type || 'N/A';
                const badgeClass = getTypeBadgeColor(displayType);
                const displayNotes = mock.notes ? `<p class="text-xs md:text-sm text-slate-500 mt-2 italic font-medium leading-relaxed bg-slate-50 p-2.5 rounded-xl border border-slate-100">${mock.notes}</p>` : '';

                // Responsive Card/Row logic
                const row = `
                    <div class="bg-white/70 md:bg-white/40 p-5 rounded-2xl md:rounded-none border border-slate-200 md:border-b md:border-x-0 md:border-t-0 last:border-b-0 hover:bg-white/90 transition-colors duration-200">
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-4 md:items-center">
                            
                            <div class="col-span-1 md:col-span-5">
                                <div class="flex flex-wrap items-center gap-2 mb-1">
                                    <span class="font-extrabold text-slate-800 text-lg">${mock.title}</span>
                                    <span class="border px-2 py-0.5 rounded-md text-[10px] font-extrabold uppercase tracking-widest shadow-sm ${badgeClass}">
                                        ${displayType}
                                    </span>
                                </div>
                                ${displayNotes}
                            </div>
                            
                            <div class="col-span-1 md:col-span-3">
                                <span class="md:hidden text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-0.5">Scheduled For</span>
                                <span class="text-slate-700 font-bold text-sm md:text-base">${formattedDate}</span>
                            </div>
                            
                            <div class="col-span-1 md:col-span-2">
                                <span class="md:hidden text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Notification</span>
                                <span class="bg-slate-100 text-slate-600 border border-slate-200 py-1.5 px-3 rounded-full text-xs font-bold shadow-sm inline-flex items-center gap-1">
                                    🔔 ${mock.notifyBefore} mins
                                </span>
                            </div>
                            
                            <div class="col-span-1 md:col-span-2 text-left md:text-center mt-2 md:mt-0">
                                <button onclick="deleteMock(${mock.id})" class="w-full md:w-auto text-rose-500 bg-rose-50 hover:bg-rose-100 border border-rose-100 py-2.5 px-4 rounded-xl transition-colors font-bold text-sm">
                                    Remove
                                </button>
                            </div>
                            
                        </div>
                    </div>
                `;
                listContainer.innerHTML += row;
            });
        }

        function checkNotifications() {
            const now = new Date();
            mocks.forEach(mock => {
                if (mock.notified) return; 
                const mockTime = new Date(mock.mockDate);
                const timeDiffMinutes = (mockTime - now) / (1000 * 60);

                if (timeDiffMinutes > 0 && timeDiffMinutes <= mock.notifyBefore) {
                    mock.notified = true;
                    localStorage.setItem('scheduledMocks', JSON.stringify(mocks));
                    const alertText = `Reminder: Your ${mock.type || 'scheduled'} mock "${mock.title}" starts in ${mock.notifyBefore} minutes!`;
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification("Mock Scheduler Alert", { 
                            body: alertText,
                            icon: "https://cdn-icons-png.flaticon.com/512/3239/3239952.png" 
                        });
                    } else {
                        alert(alertText);
                    }
                }
            });
        }

        function downloadPDF() {
            if (mocks.length === 0) {
                alert("No scheduled mocks to download!");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(79, 70, 229); 
            doc.text("Mock Preparation Schedule", 14, 22);
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(100, 116, 139); 
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);

            const tableColumn = ["Title", "Category", "Date & Time", "Notes"];
            const tableRows = [];

            mocks.forEach(mock => {
                const dateObj = new Date(mock.mockDate);
                const mockData = [
                    mock.title,
                    mock.type || 'N/A',
                    dateObj.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }),
                    mock.notes || '-'
                ];
                tableRows.push(mockData);
            });

            doc.autoTable({
                head: [tableColumn],
                body: tableRows,
                startY: 38,
                headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], fontStyle: 'bold' }, 
                styles: { font: 'helvetica', fontSize: 10, cellPadding: 5 },
                alternateRowStyles: { fillColor: [248, 250, 252] },
                columnStyles: {
                    0: { cellWidth: 40, fontStyle: 'bold' },
                    1: { cellWidth: 25 },
                    2: { cellWidth: 45 },
                    3: { cellWidth: 'auto', fontStyle: 'italic', textColor: [100, 116, 139] } 
                }
            });

            doc.save("Responsive_Mock_Schedule.pdf");
        }
    </script>
</body>
</html>
